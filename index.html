<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pickleball Scorer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="app-header">
Built by <strong>Zyl Arpon</strong>
</header>


<!-- SETUP SCREEN -->

<div id="setupScreen" class="setup-screen">

<h1>Match Setup</h1>

<h2>Players</h2>

<label>Player 1 (Team A)</label>
<input id="nameA1" placeholder="Player 1">

<label>Player 2 (Team A) (Based Leader)</label>
<input id="nameA2" placeholder="Player 2">

<label>Player 3 (Team B) (Based Leader)</label>
<input id="nameB1" placeholder="Player 3">

<label>Player 4 (Team B)</label>
<input id="nameB2" placeholder="Player 4">


<h2>Game and Match</h2>

<label>Best Of</label>
<select id="bestOf">
<option value="1">1</option>
<option value="3" selected>3</option>
<option value="5">5</option>
</select>

<label>Games To</label>
<select id="gameTo">
<option value="11" selected>11</option>
<option value="15">15</option>
<option value="21">21</option>
</select>

<label>Winner Rule</label>
<select id="winRule">
<option value="2">Win by 2</option>
<option value="1">No Win by 2</option>
</select>

<label>Timeouts per Game</label>
<select id="timeouts">
<option value="1">1</option>
<option value="2" selected>2</option>
<option value="3">3</option>
</select>

<label>Starting Server</label>
<select id="startTeam">
<option value="A" selected>Team A</option>
<option value="B">Team B</option>
</select>

<button class="start-btn" onclick="startGame()">Start Match</button>

</div>


<!-- GAME SCREEN -->

<div id="gameScreen" style="display:none">

<div class="page">

<div class="left-panel">

<div class="court">

<img src="court.png" class="court-img">

<div class="team-label team-left">TEAM A</div>
<div class="team-label team-right">TEAM B</div>

<div class="rally-counter">
Rally <span id="rallyNum">0</span>
</div>

<div id="a1" class="zone player a1"></div>
<div id="a2" class="zone player a2"></div>

<div id="b1" class="zone player b1"></div>
<div id="b2" class="zone player b2"></div>

<div class="timeout-row timeoutA">
<div id="a_to1" class="timeout-dot"></div>
<div id="a_to2" class="timeout-dot"></div>
<div id="a_to3" class="timeout-dot"></div>
</div>

<div class="timeout-row timeoutB">
<div id="b_to1" class="timeout-dot"></div>
<div id="b_to2" class="timeout-dot"></div>
<div id="b_to3" class="timeout-dot"></div>
</div>

</div>

<div class="scoreboard">

<div class="scorecall">
Score: <span id="serverName"></span>
</div>

<div class="controls">

<button class="btn teamA" onclick="rallyWinner('A')">
Team A Won Rally
</button>

<button class="btn teamB" onclick="rallyWinner('B')">
Team B Won Rally
</button>

<button class="btn timeoutA-btn" onclick="callTimeout('A')">
Team A Timeout
</button>

<button class="btn timeoutB-btn" onclick="callTimeout('B')">
Team B Timeout
</button>

<button class="btn undo" onclick="openUndoModal()">
Undo
</button>

<button class="btn reset" onclick="resetMatch()">
Reset Match
</button>

</div>

</div>

</div>

<div class="log-section">

<h3>Game Log</h3>

<div class="log-table-wrapper">

<table id="logTable">

<thead>
<tr>
<th>#</th>
<th>Event</th>
<th>Score</th>
<th>Serving</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<button class="download-btn" onclick="downloadLog()">Download Game Log</button>

</div>

</div>

<div id="winModal" class="win-modal">

<div class="win-card">

<h2 id="winnerTitle"></h2>

<div class="win-stats">
<div><strong>Final Score</strong></div>
<div id="finalScore"></div>
</div>

<div class="mvp-box">
<span id="mvpName"></span>
</div>

<button onclick="closeWinModal()" class="close-win">
Close
</button>

</div>

</div>

<div id="resetModal" class="reset-modal">

<div class="reset-card">

<h3>Reset Match?</h3>

<p>This will clear the entire match.</p>

<div class="reset-actions">

<button class="reset-cancel" onclick="closeResetModal()">Cancel</button>

<button class="reset-confirm" onclick="confirmReset()">Reset</button>

</div>

</div>

</div>

<div id="undoModal" class="reset-modal">

<div class="reset-card">

<h3>Admin Authorization</h3>

<p>Type <strong>admin</strong> to allow undo.</p>

<input id="undoPassword" type="password" placeholder="Enter admin code"
style="width:100%;padding:10px;margin-bottom:16px;border:1px solid #ccc;border-radius:6px">

<div class="reset-actions">

<button class="reset-cancel" onclick="closeUndoModal()">Cancel</button>

<button class="reset-confirm" onclick="confirmUndo()">Authorize</button>

</div>

</div>

</div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
<script src="script.js"></script>

</body>
</html>
