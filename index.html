<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pickleball Scorer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="setup">
<h2>Game Setup</h2>

<input id="nameA1" placeholder="Player 1">
<input id="nameA2" placeholder="Player 2">
<input id="nameB1" placeholder="Player 3">
<input id="nameB2" placeholder="Player 4">

<button onclick="startGame()">Start Game</button>
</div>


<div class="court">

<img src="court.png" class="court-img">

<div id="a1" class="zone player a1">P1</div>
<div id="a2" class="zone player a2">P2</div>

<div id="b1" class="zone player b1">P3</div>
<div id="b2" class="zone player b2">P4</div>

</div>


<div class="scoreboard">

<div class="scorecall">
Server: <span id="serverName">0-0-2</span>
</div>

<div class="controls">
<button class="btn teamA" onclick="rallyWinner('A')">Team A Won Rally</button>
<button class="btn teamB" onclick="rallyWinner('B')">Team B Won Rally</button>
<button class="btn undo" onclick="undoAction()">Undo</button>
</div>

</div>


<div class="log-section">

<h3>Game Log</h3>

<table id="logTable">

<thead>
<tr>
<th>#</th>
<th>Event</th>
<th>Score</th>
<th>Serving</th>
</tr>
</thead>

<tbody></tbody>

</table>

<button class="download-btn" onclick="downloadLog()">Download Game Log</button>

</div>

<script src="script.js"></script>

</body>
</html>
